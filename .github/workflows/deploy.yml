name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'ENDSSH'
            set -e

            cd /var/www/chatbot_backend

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            .venv/bin/pip install -r requirements.txt -q

            echo "♻️ Restarting service..."
            systemctl restart chatbot_backend

            echo "⏳ Waiting for service to be ready..."
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:8000/docs > /dev/null 2>&1; then
                echo "🌐 Health check passed on attempt $i"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "❌ Service did not respond after 15 seconds"
                systemctl status chatbot_backend --no-pager
                exit 1
              fi
              sleep 1
            done

            echo "🚀 Deployment complete!"
          ENDSSH


