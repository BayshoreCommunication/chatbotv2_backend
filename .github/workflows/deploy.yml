name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'ENDSSH'
            set -e

            cd /var/www/chatbot_backend

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            .venv/bin/pip install -r requirements.txt -q

            echo "♻️ Restarting service..."
            systemctl restart chatbot_backend
            sleep 2

            echo "✅ Checking service status..."
            systemctl is-active chatbot_backend

            echo "🌐 Health check..."
            curl -sf http://127.0.0.1:8000/docs > /dev/null

            echo "🚀 Deployment complete!"
          ENDSSH

