name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Write SSH key from base64
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 68.183.227.9
          username: root
          key_path: /tmp/deploy_key
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /var/www/chatbot_backend
            git pull origin main

            echo "=== Installing/updating dependencies ==="
            .venv/bin/pip install -r requirements.txt -q

            echo "=== Restarting service ==="
            systemctl restart chatbot_backend

            echo "=== Verifying service is running ==="
            sleep 2
            systemctl is-active chatbot_backend

            echo "=== Health check ==="
            curl -sf http://127.0.0.1:8000/docs > /dev/null
            echo "Deploy complete!"

